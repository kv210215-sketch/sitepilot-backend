name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-build:
    name: Backend build & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev --legacy-peer-deps

      - name: Validate required ENV vars are present
        env:
          JWT_SECRET: ci_jwt_secret_for_build_only_at_least_32_chars!!
        run: |
          node -e "
            const secret = process.env.JWT_SECRET;
            if (!secret || secret.length < 32) { console.error('JWT_SECRET missing or too short'); process.exit(1); }
            console.log('ENV validation passed');
          "

      - name: Build backend
        env:
          JWT_SECRET: ci_jwt_secret_for_build_only_at_least_32_chars!!
        run: npm run build

      - name: Run unit tests
        env:
          JWT_SECRET: ci_jwt_secret_for_build_only_at_least_32_chars!!
          JWT_REFRESH_SECRET: ci_refresh_secret_for_build_only_32chars!!
        run: npm run test -- --passWithNoTests=false --forceExit

  backend-e2e:
    name: Backend E2E tests
    runs-on: ubuntu-latest
    needs: backend-build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sitepilot
          POSTGRES_PASSWORD: sitepilot
          POSTGRES_DB: sitepilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev --legacy-peer-deps

      - name: Run E2E tests against sitepilot_test database
        env:
          TEST_DATABASE_URL: postgresql://sitepilot:sitepilot@localhost:5432/sitepilot_test
          DATABASE_URL: postgresql://sitepilot:sitepilot@localhost:5432/sitepilot_test
          NODE_ENV: test
        run: npm run test:e2e

      - name: Verify migration drift (migrations table exists and is populated)
        env:
          PGPASSWORD: sitepilot
        run: |
          COUNT=$(psql -h localhost -U sitepilot -d sitepilot_test -t -c "SELECT COUNT(*) FROM migrations;" | tr -d '[:space:]')
          if [ "$COUNT" -lt "1" ]; then
            echo "ERROR: No migrations recorded — migration drift detected"
            exit 1
          fi
          echo "Migration check passed: $COUNT migration(s) applied"
