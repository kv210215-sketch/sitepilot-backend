# docker compose up -d postgres   → start only postgres
# docker compose up -d           → start all services
# docker compose down            → stop everything
services:
  postgres:
    image: postgres:16-alpine
    container_name: sitepilot-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sitepilot
      POSTGRES_PASSWORD: sitepilot
      POSTGRES_DB: sitepilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sitepilot -d sitepilot']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Uncomment to add pgAdmin for DB management UI (available at localhost:5050)
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: sitepilot-pgadmin
  #   restart: unless-stopped
  #   ports:
  #     - '5050:80'
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@sitepilot.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
